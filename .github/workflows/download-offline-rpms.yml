name: Download RPMs Offline

on:
  workflow_dispatch:
    inputs:
      system:
        description: "Target OS repository"
        required: true
        default: "centos7"
        type: choice
        options:
          - centos7
      packages:
        description: "RPM package names, separated by spaces"
        required: true
        default: "rpcbind nfs-utils"
        type: string
      arch:
        description: "Target architecture"
        required: true
        default: "aarch64"
        type: choice
        options:
          - aarch64
          - x86_64

jobs:
  download:
    name: Download ${{ inputs.system }} ${{ inputs.arch }} RPMs
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9

    steps:
      - name: Install downloader tools
        run: |
          set -euo pipefail
          dnf -y install dnf-plugins-core createrepo_c tar gzip

      - name: Configure target yum repositories
        shell: bash
        run: |
          set -euo pipefail

          case "${{ inputs.system }}" in
            centos7)
              release="7.9.2009"
              if [ "${{ inputs.arch }}" = "x86_64" ]; then
                base="https://vault.centos.org/${release}"
              else
                # CentOS 7 non-x86 architectures live under the official altarch vault.
                base="https://vault.centos.org/altarch/${release}"
              fi

              cat > /etc/yum.repos.d/target-centos7.repo <<EOF
          [target-base]
          name=CentOS 7 Base - ${{ inputs.arch }}
          baseurl=${base}/os/${{ inputs.arch }}/
          enabled=1
          gpgcheck=0

          [target-updates]
          name=CentOS 7 Updates - ${{ inputs.arch }}
          baseurl=${base}/updates/${{ inputs.arch }}/
          enabled=1
          gpgcheck=0

          [target-extras]
          name=CentOS 7 Extras - ${{ inputs.arch }}
          baseurl=${base}/extras/${{ inputs.arch }}/
          enabled=1
          gpgcheck=0
          EOF
              ;;
            *)
              echo "Unsupported system: ${{ inputs.system }}" >&2
              exit 1
              ;;
          esac

          rm -f /etc/yum.repos.d/centos*.repo /etc/yum.repos.d/CentOS*.repo || true
          dnf clean all
          dnf --forcearch="${{ inputs.arch }}" repolist

      - name: Download RPMs with dependencies
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p rpms
          read -r -a pkg_array <<< "${{ inputs.packages }}"

          dnf download \
            --forcearch="${{ inputs.arch }}" \
            --resolve \
            --alldeps \
            --destdir rpms \
            "${pkg_array[@]}"

          createrepo_c rpms
          rpm -qp --qf '%{NAME}-%{VERSION}-%{RELEASE}.%{ARCH}.rpm\n' rpms/*.rpm | sort > rpms/RPM_LIST.txt
          tar -czf "rpms-${{ inputs.system }}-${{ inputs.arch }}.tar.gz" rpms

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ inputs.system }}-${{ inputs.arch }}
          path: rpms-${{ inputs.system }}-${{ inputs.arch }}.tar.gz
          if-no-files-found: error
