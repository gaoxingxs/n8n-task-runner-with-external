# .github/workflows/download-offline-rpms.yml
name: Download Offline RPM Packages

on:
  workflow_dispatch:
    inputs:
      os_image:
        description: 'Docker 镜像 (如 centos:7, rockylinux:8)'
        required: true
        default: 'centos:7'
      packages:
        description: '要下载的包名，多个用空格分隔 (如 rpcbind nfs-utils 或 rpcbind-0.2.0-49.el7)'
        required: true
        default: 'rpcbind nfs-utils'
      arch:
        description: '目标架构 (x86_64, aarch64)'
        required: false
        default: 'x86_64'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-architecture)
        if: ${{ inputs.arch != 'x86_64' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ inputs.arch }}

      - name: Download packages using container
        run: |
          # 创建工作目录
          mkdir -p output
          
          # 在指定镜像中运行下载命令
          docker run --rm --platform linux/${{ inputs.arch }} \
            -v ${{ github.workspace }}/output:/output \
            ${{ inputs.os_image }} \
            bash -c "
              # 安装 yum-utils (提供 yumdownloader) 或 dnf-plugins-core
              if command -v dnf &> /dev/null; then
                dnf install -y dnf-plugins-core
                download_cmd='dnf download --resolve --destdir=/output'
              else
                yum install -y yum-utils
                download_cmd='yumdownloader --resolve --destdir=/output'
              fi
              
              # 处理包名中的版本号（如果有空格，用引号包住整个变量）
              packages='${{ inputs.packages }}'
              echo \"下载包: \$packages\"
              \$download_cmd \$packages
            "
      
      - name: Create artifact
        run: |
          cd output
          tar -czf offline-rpms.tar.gz *.rpm
          mv offline-rpms.tar.gz ${{ github.workspace }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-rpms-${{ inputs.os_image }}-${{ inputs.arch }}
          path: offline-rpms.tar.gz
