name: Build llama.cpp for CentOS 7

on:
  workflow_dispatch:

jobs:
  build-centos7:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    
    steps:
      - name: Install System Dependencies
        run: |
          # 1. 安装基础工具
          yum install -y devtoolset-11-gcc devtoolset-11-gcc-c++ devtoolset-11-binutils git wget python3
          
          # 2. 升级 pip 并安装 cmake
          python3 -m pip install --upgrade pip
          python3 -m pip install cmake
          
          # 3. 核心修正：建立 cmake 软链接确保全局可用
          ln -s /usr/local/bin/cmake /usr/bin/cmake || true

      - name: Manual Clone
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp .

      - name: Build
        run: |
          # 激活 GCC 11
          source /opt/rh/devtoolset-11/enable
          
          mkdir build
          cd build
          
          # 直接使用 cmake 命令代替 python3 -m cmake
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_AVX512=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
            -DCMAKE_SKIP_RPATH=ON
          
          cmake --build . --config Release -j $(nproc)

      - name: Package Binaries
        run: |
          mkdir -p release_bin
          cp build/bin/llama-cli release_bin/
          cp build/bin/llama-server release_bin/
          tar -czvf llama-cpp-centos7-avx512.tar.gz release_bin/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-centos7-binary
          path: llama-cpp-centos7-avx512.tar.gz
