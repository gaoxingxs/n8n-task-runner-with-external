name: Build llama.cpp for CentOS 7

on:
  workflow_dispatch:

jobs:
  build-centos7:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    
    steps:
      - name: Install System Dependencies
        run: |
          # 安装开发工具集和 Python3
          yum install -y devtoolset-11-gcc devtoolset-11-gcc-c++ devtoolset-11-binutils git wget python3
          
          # 确保 pip 可用并安装最新版 cmake
          python3 -m pip install --upgrade pip
          python3 -m pip install cmake

      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          fetch-depth: 1 # 只拉取最新提交，加快速度

      - name: Build
        run: |
          # 激活 GCC 11 环境
          source /opt/rh/devtoolset-11/enable
          
          mkdir build
          cd build
          
          # 使用 python3 运行已安装的 cmake
          python3 -m cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_AVX512=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
            -DCMAKE_SKIP_RPATH=ON
          
          cmake --build . --config Release -j $(nproc)

      - name: Package Binaries
        run: |
          mkdir -p release_bin
          # 复制主要的可执行文件
          cp build/bin/llama-cli release_bin/
          cp build/bin/llama-server release_bin/
          # 如果需要，也可以带上 llama-quantize
          cp build/bin/llama-quantize release_bin/ || true
          
          tar -czvf llama-cpp-centos7-avx512.tar.gz release_bin/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-centos7-binary
          path: llama-cpp-centos7-avx512.tar.gz
