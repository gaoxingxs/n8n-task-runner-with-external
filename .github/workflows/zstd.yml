name: Build zstd Static

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: facebook/zstd

      - name: Install dependencies
        run: |
          sudo apt-get update
          # 安装交叉编译器以及可能的静态库支持
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross
          else
            sudo apt-get install -y build-essential libc6-dev
          fi

      - name: Compile zstd (Fully Static)
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            # 关键点：添加 LDFLAGS="-static" 实现全静态链接
            make -j$(nproc) CC=aarch64-linux-gnu-gcc LDFLAGS="-static"
          else
            make -j$(nproc) LDFLAGS="-static"
          fi

      - name: Verify Binary
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            # 检查是否真的成了静态链接（arm64 在 amd64 环境下无法直接运行，跳过验证）
            ldd zstd || echo "Static binary confirmed"
            file zstd
          fi

      - name: Prepare and Upload
        run: |
          mv zstd zstd-${{ matrix.arch }}-static
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zstd-${{ matrix.arch }}-static
          path: zstd-${{ matrix.arch }}-static
